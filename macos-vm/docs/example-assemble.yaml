# imt vm assemble — example VM fleet file
#
# Usage:
#   imt vm assemble --file docs/example-assemble.yaml
#   imt vm assemble --file docs/example-assemble.yaml --dry-run
#
# All fields except 'name' are optional; defaults are used when omitted.
# Disk size is set at image build time (imt image build --size), not here.
# Run 'imt vm assemble --help' for the full schema.

vms:
  - name: macos-sonoma
    version: sonoma
    ram: 8GiB
    cpus: 6

  - name: macos-ventura
    version: ventura
    ram: 4GiB
    cpus: 4

  - name: macos-monterey
    version: monterey
